name: scoutset
description: Base escalavel do aplicativo ScoutSet para volei, analise e performance.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_scoutset.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_scoutset.png
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#081426"
