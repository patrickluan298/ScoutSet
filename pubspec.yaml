name: scoutset
description: Base escalavel do aplicativo ScoutSet para volei, analise e performance.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_scoutset.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_scoutset.png
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#081426"
  adaptive_icon_background: "#081426"
  adaptive_icon_foreground: assets/images/logo_scoutset.png
